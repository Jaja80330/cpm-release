<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' file: data:;" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 800px;
      height: 450px;
      overflow: hidden;
      background: #1a1a1a;
      user-select: none;
      -webkit-user-select: none;
    }

    #bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Zone spinner + texte + barre de progression */
    #spinner-wrap {
      position: absolute;
      bottom: 14%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 220px;
    }

    /* Cercle de progression SVG — arc Fluent Blue */
    .ring {
      animation: rotate 0.9s linear infinite;
      transform-origin: center;
    }

    @keyframes rotate {
      from { transform: rotate(0deg);   }
      to   { transform: rotate(360deg); }
    }

    #label {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 0.04em;
      text-align: center;
      white-space: nowrap;
    }

    /* Barre de progression — masquée par défaut */
    #progress-track {
      display: none;
      width: 180px;
      height: 3px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 2px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: #60cdff;
      border-radius: 2px;
      transition: width 0.25s ease;
    }
  </style>
</head>
<body>
  <div id="bg"></div>

  <div id="spinner-wrap">
    <svg width="36" height="36" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
      <!-- Track -->
      <circle cx="18" cy="18" r="14"
        fill="none"
        stroke="rgba(255,255,255,0.12)"
        stroke-width="3" />
      <!-- Arc animé -->
      <circle cx="18" cy="18" r="14"
        fill="none"
        stroke="#60cdff"
        stroke-width="3"
        stroke-dasharray="87.96"
        stroke-dashoffset="65.97"
        stroke-linecap="round"
        class="ring" />
    </svg>
    <span id="label">Chargement…</span>
    <div id="progress-track">
      <div id="progress-bar"></div>
    </div>
  </div>

  <script>
    // Image de fond depuis la query string (?img=file:///...)
    const params  = new URLSearchParams(window.location.search)
    const imgPath = params.get('img')
    if (imgPath) {
      const fileUrl = imgPath.startsWith('file:')
        ? imgPath
        : 'file:///' + imgPath.replace(/\\/g, '/')
      document.getElementById('bg').style.backgroundImage = `url('${fileUrl}')`
    }

    const label        = document.getElementById('label')
    const progressTrack = document.getElementById('progress-track')
    const progressBar  = document.getElementById('progress-bar')

    // Écoute les messages IPC envoyés depuis le processus principal
    if (window.splashAPI) {
      window.splashAPI.onStatus(({ text, progress }) => {
        if (text !== undefined) label.textContent = text

        if (progress !== undefined) {
          progressTrack.style.display = 'block'
          progressBar.style.width = Math.round(progress) + '%'
        }
      })
    }
  </script>
</body>
</html>
